  <script>
    const content={en:{badge:'Privacy',title:'Privacy Policy',updated:'Last updated: April 15, 2026',footer:'Storease legal center',footerLink:'Terms of Service →',sections:[['Introduction','<p>Storease protects the account and business information you place in the app. This policy explains what we collect, how we use it, and what choices you have.</p><p>By using Storease, you agree to the practices described here.</p>'],['Information we collect','<ul><li><strong>Account information:</strong> name, email, sign-in method, language, and store membership.</li><li><strong>Business records:</strong> products, suppliers, customers, sales, invoices, quotations, payments, expenses, warehouses, batches, returns, and settings entered by your team.</li><li><strong>Device and app information:</strong> app version, preferences, and basic diagnostic logs.</li><li><strong>Subscription information:</strong> offering and entitlement status from RevenueCat and the app store.</li><li><strong>Local files:</strong> CSV exports and JSON backups saved on your device when you choose to create them.</li></ul>'],['How we use information','<ul><li>Provide inventory, POS, finance, reporting, document, and staff-access features.</li><li>Sync business data across signed-in devices connected to the same account and store.</li><li>Show dashboards, balances, alerts, receipts, and analytics based on your business activity.</li><li>Support subscriptions, purchase restoration, troubleshooting, and security.</li></ul>'],['Providers and sharing','<ul><li><strong>Supabase</strong> stores account and business records.</li><li><strong>RevenueCat</strong> manages subscription entitlement status.</li><li><strong>Google Play and Apple App Store</strong> handle billing and purchase restoration.</li><li><strong>Google sign-in providers</strong> support secure authentication when selected.</li></ul><p>We do not sell your business data. We share data only when needed to deliver Storease, process subscriptions, or comply with law.</p>'],['Storage and retention','<div class="highlight"><p>Storease business data is mainly kept in the cloud so the same store can be opened again on another signed-in device.</p></div><ul><li>Core business records remain until you delete them, close the account, or law requires removal.</li><li>System notification history may be trimmed automatically after a period of time to manage storage.</li><li>Backups and exports saved on your device remain there until you delete them.</li></ul>'],['Your choices and contact','<ul><li>You can review and update business records inside the app.</li><li>You can change notification preferences inside Storease and in device settings.</li><li>Subscription billing, cancellation, and renewal are managed by the app store account used for purchase.</li></ul><p>We may update this policy as Storease evolves. For privacy questions, use the support contact shown in the Storease listing or the support channel provided by your Storease operator.</p>']]},
    fr:{badge:'Confidentialite',title:'Politique de confidentialite',updated:'Derniere mise a jour : 15 avril 2026',footer:'Centre juridique Storease',footerLink:"Conditions d'utilisation →",sections:[['Introduction',"<p>Storease protege les informations de compte et les donnees commerciales placees dans l'application. Cette politique explique ce que nous collectons, comment nous l'utilisons et quels choix vous possedez.</p><p>En utilisant Storease, vous acceptez les pratiques decrites ici.</p>"],['Informations collecte es',"<ul><li><strong>Compte :</strong> nom, email, methode de connexion, langue et appartenance au magasin.</li><li><strong>Donnees commerciales :</strong> produits, fournisseurs, clients, ventes, factures, devis, paiements, depenses, entrepots, lots, retours et reglages saisis par votre equipe.</li><li><strong>Appareil et application :</strong> version de l'application, preferences et journaux de diagnostic de base.</li><li><strong>Abonnement :</strong> offres et statut d'entitlement venant de RevenueCat et de la boutique.</li><li><strong>Fichiers locaux :</strong> exports CSV et sauvegardes JSON completes enregistres sur votre appareil.</li></ul>"],['Utilisation des informations',"<ul><li>Fournir les fonctions d'inventaire, POS, finance, rapports, documents et acces du personnel.</li><li>Synchroniser les donnees commerciales entre appareils relies au meme compte et au meme magasin.</li><li>Afficher tableaux de bord, soldes, alertes, recus et analyses selon l'activite du commerce.</li><li>Prendre en charge les abonnements, la restauration des achats, le support et la securite.</li></ul>"],['Prestataires et partage',"<ul><li><strong>Supabase</strong> stocke les comptes et les donnees commerciales.</li><li><strong>RevenueCat</strong> gere le statut d'abonnement.</li><li><strong>Google Play et Apple App Store</strong> gerent la facturation et la restauration.</li><li><strong>Google sign-in</strong> prend en charge l'authentification securisee lorsque vous le choisissez.</li></ul><p>Nous ne vendons pas vos donnees commerciales. Elles ne sont partagees qu'en cas de besoin pour fournir Storease, traiter les abonnements ou respecter la loi.</p>"],['Stockage et retention','<div class="highlight"><p>Les donnees commerciales de Storease sont principalement conservees dans le cloud pour que le meme magasin puisse etre rouvert sur un autre appareil connecte.</p></div><ul><li>Les donnees principales restent disponibles jusqu a suppression, fermeture du compte ou obligation legale de retrait.</li><li>L historique des notifications systeme peut etre reduit automatiquement apres un certain delai.</li><li>Les exports et sauvegardes sur votre appareil y restent jusqu a leur suppression manuelle.</li></ul>'],['Vos choix et contact',"<ul><li>Vous pouvez consulter et mettre a jour les donnees dans l'application.</li><li>Vous pouvez modifier les notifications dans Storease et dans les reglages du telephone.</li><li>La facturation, l'annulation et le renouvellement de l'abonnement sont geres par la boutique utilisee lors de l'achat.</li></ul><p>Nous pouvons mettre a jour cette politique lorsque Storease evolue. Pour toute question de confidentialite, utilisez le contact d'assistance affiche sur la fiche Storease ou fourni par votre operateur Storease.</p>"]]},
    es:{badge:'Privacidad',title:'Politica de privacidad',updated:'Ultima actualizacion: 15 de abril de 2026',footer:'Centro legal de Storease',footerLink:'Terminos de servicio →',sections:[['Introduccion','<p>Storease protege la informacion de cuenta y los datos del negocio colocados en la app. Esta politica explica que recopilamos, como lo usamos y que opciones tiene.</p><p>Al usar Storease, usted acepta las practicas descritas aqui.</p>'],['Informacion que recopilamos','<ul><li><strong>Cuenta:</strong> nombre, correo, metodo de inicio de sesion, idioma y pertenencia a la tienda.</li><li><strong>Registros del negocio:</strong> productos, proveedores, clientes, ventas, facturas, cotizaciones, pagos, gastos, almacenes, lotes, devoluciones y ajustes ingresados por su equipo.</li><li><strong>Dispositivo y app:</strong> version de la app, preferencias y registros diagnosticos basicos.</li><li><strong>Suscripcion:</strong> ofertas y estado del entitlement desde RevenueCat y la tienda.</li><li><strong>Archivos locales:</strong> exportaciones CSV y copias JSON guardadas en su dispositivo.</li></ul>'],['Como usamos la informacion','<ul><li>Ofrecer funciones de inventario, POS, finanzas, reportes, documentos y acceso del personal.</li><li>Sincronizar datos del negocio entre dispositivos conectados a la misma cuenta y tienda.</li><li>Mostrar paneles, saldos, alertas, recibos y analitica segun la actividad comercial.</li><li>Respaldar suscripciones, restauracion de compras, soporte y seguridad.</li></ul>'],['Proveedores y comparticion','<ul><li><strong>Supabase</strong> almacena cuentas y datos comerciales.</li><li><strong>RevenueCat</strong> administra el estado de la suscripcion.</li><li><strong>Google Play y Apple App Store</strong> gestionan cobros y restauracion.</li><li><strong>Google sign-in</strong> ofrece autenticacion segura cuando se elige.</li></ul><p>No vendemos sus datos comerciales. Solo los compartimos cuando es necesario para prestar Storease, procesar suscripciones o cumplir la ley.</p>'],['Almacenamiento y retencion','<div class="highlight"><p>Los datos comerciales de Storease se guardan principalmente en la nube para que la misma tienda pueda abrirse otra vez en otro dispositivo con la misma cuenta.</p></div><ul><li>Los registros principales se conservan hasta que usted los elimine, cierre la cuenta o la ley exija su retiro.</li><li>El historial de notificaciones del sistema puede recortarse automaticamente despues de un tiempo.</li><li>Las copias y exportaciones guardadas en su dispositivo permanecen alli hasta que usted las elimine.</li></ul>'],['Sus opciones y contacto','<ul><li>Puede revisar y actualizar los datos del negocio dentro de la app.</li><li>Puede cambiar las preferencias de notificaciones en Storease y en el dispositivo.</li><li>La facturacion, cancelacion y renovacion de la suscripcion se gestionan desde la cuenta de la tienda usada en la compra.</li></ul><p>Podemos actualizar esta politica cuando Storease evolucione. Para consultas de privacidad, use el contacto de soporte mostrado en la ficha de Storease o el canal dado por su operador Storease.</p>']]},
    pt:{badge:'Privacidade',title:'Politica de privacidade',updated:'Ultima atualizacao: 15 de abril de 2026',footer:'Centro legal da Storease',footerLink:'Termos de servico →',sections:[['Introducao','<p>A Storease protege as informacoes da conta e os dados do negocio colocados no app. Esta politica explica o que coletamos, como usamos e quais escolhas voce possui.</p><p>Ao usar a Storease, voce concorda com as praticas descritas aqui.</p>'],['Informacoes que coletamos','<ul><li><strong>Conta:</strong> nome, email, metodo de login, idioma e acesso a loja.</li><li><strong>Registros do negocio:</strong> produtos, fornecedores, clientes, vendas, faturas, cotacoes, pagamentos, despesas, armazens, lotes, devolucoes e ajustes da equipe.</li><li><strong>Dispositivo e app:</strong> versao do app, preferencias e registros basicos de diagnostico.</li><li><strong>Assinatura:</strong> ofertas e status do entitlement vindos do RevenueCat e da loja.</li><li><strong>Arquivos locais:</strong> exportacoes CSV e backups JSON salvos no dispositivo.</li></ul>'],['Como usamos as informacoes','<ul><li>Fornecer recursos de inventario, POS, financas, relatorios, documentos e acesso de equipe.</li><li>Sincronizar dados do negocio entre dispositivos conectados a mesma conta e loja.</li><li>Mostrar paineis, saldos, alertas, recibos e analiticos conforme a atividade comercial.</li><li>Dar suporte a assinaturas, restauracao de compras, suporte tecnico e seguranca.</li></ul>'],['Prestadores e compartilhamento','<ul><li><strong>Supabase</strong> armazena contas e dados comerciais.</li><li><strong>RevenueCat</strong> gerencia o status da assinatura.</li><li><strong>Google Play e Apple App Store</strong> fazem cobranca e restauracao.</li><li><strong>Google sign-in</strong> oferece autenticacao segura quando escolhido.</li></ul><p>Nao vendemos seus dados comerciais. Eles so sao compartilhados quando necessario para fornecer a Storease, processar assinaturas ou cumprir a lei.</p>'],['Armazenamento e retencao','<div class="highlight"><p>Os dados comerciais da Storease ficam principalmente na nuvem para que a mesma loja possa ser aberta novamente em outro dispositivo conectado a mesma conta.</p></div><ul><li>Os registros principais permanecem disponiveis ate exclusao, encerramento da conta ou obrigacao legal de remocao.</li><li>O historico de notificacoes do sistema pode ser reduzido automaticamente depois de algum tempo.</li><li>Backups e exportacoes salvos no dispositivo permanecem ali ate que voce os apague.</li></ul>'],['Suas escolhas e contato','<ul><li>Voce pode revisar e atualizar dados do negocio dentro do app.</li><li>Voce pode alterar preferencias de notificacao na Storease e no dispositivo.</li><li>Cobranca, cancelamento e renovacao da assinatura sao gerenciados pela conta da loja usada na compra.</li></ul><p>Podemos atualizar esta politica quando a Storease evoluir. Para duvidas de privacidade, use o contato de suporte mostrado na listagem da Storease ou o canal informado pelo operador da Storease.</p>']]},
    ar:{badge:'الخصوصية',title:'سياسة الخصوصية',updated:'آخر تحديث: 15 أبريل 2026',footer:'مركز Storease القانوني',footerLink:'شروط الخدمة ←',sections:[['المقدمة','<p>تحمي Storease معلومات الحساب وبيانات النشاط التجاري التي تضعها داخل التطبيق. توضح هذه السياسة ما الذي نجمعه وكيف نستخدمه وما الخيارات المتاحة لك.</p><p>باستخدام Storease فإنك توافق على الممارسات الموضحة هنا.</p>'],['المعلومات التي نجمعها','<ul><li><strong>الحساب:</strong> الاسم والبريد الإلكتروني وطريقة تسجيل الدخول واللغة والانضمام إلى المتجر.</li><li><strong>السجلات التجارية:</strong> المنتجات والموردون والعملاء والمبيعات والفواتير وعروض الأسعار والمدفوعات والمصروفات والمخازن والدفعات والمرتجعات والإعدادات التي يدخلها فريقك.</li><li><strong>الجهاز والتطبيق:</strong> إصدار التطبيق والتفضيلات وسجلات تشخيص أساسية.</li><li><strong>الاشتراك:</strong> العروض وحالة الامتياز عبر RevenueCat ومتجر التطبيقات.</li><li><strong>الملفات المحلية:</strong> ملفات CSV ونسخ JSON التي تحفظ على جهازك.</li></ul>'],['كيف نستخدم المعلومات','<ul><li>لتقديم ميزات المخزون ونقطة البيع والمالية والتقارير والمستندات وصلاحيات الفريق.</li><li>لمزامنة بيانات المتجر بين الأجهزة المسجلة على الحساب والمتجر نفسه.</li><li>لعرض اللوحات والأرصدة والتنبيهات والإيصالات والتحليلات حسب نشاط المتجر.</li><li>لدعم الاشتراكات واستعادة المشتريات والمساندة الفنية والأمان.</li></ul>'],['مقدمو الخدمة والمشاركة','<ul><li><strong>Supabase</strong> لحفظ الحسابات والبيانات التجارية.</li><li><strong>RevenueCat</strong> لإدارة حالة الاشتراك.</li><li><strong>Google Play و Apple App Store</strong> للفوترة والاستعادة.</li><li><strong>تسجيل الدخول عبر Google</strong> للمصادقة الآمنة عند اختياره.</li></ul><p>نحن لا نبيع بياناتك التجارية، ولا نشاركها إلا عند الحاجة لتقديم Storease أو معالجة الاشتراكات أو الامتثال للقانون.</p>'],['التخزين والاحتفاظ','<div class="highlight"><p>يتم حفظ بيانات Storease التجارية بشكل أساسي في السحابة حتى يمكن فتح المتجر نفسه لاحقًا على جهاز آخر باستخدام الحساب نفسه.</p></div><ul><li>تبقى السجلات الرئيسية متاحة حتى تحذفها أنت أو تغلق الحساب أو يتطلب القانون إزالتها.</li><li>قد يتم تقليص سجل إشعارات النظام تلقائيًا بعد مدة زمنية معينة.</li><li>تبقى النسخ الاحتياطية وملفات التصدير على جهازك إلى أن تقوم بحذفها بنفسك.</li></ul>'],['خياراتك والتواصل','<ul><li>يمكنك مراجعة بيانات النشاط التجاري وتحديثها داخل التطبيق.</li><li>يمكنك تغيير تفضيلات الإشعارات داخل Storease ومن إعدادات الجهاز.</li><li>تتم إدارة الفوترة والإلغاء والتجديد من خلال حساب متجر التطبيقات المستخدم عند الشراء.</li></ul><p>قد نقوم بتحديث هذه السياسة مع تطور Storease. لأسئلة الخصوصية استخدم جهة الدعم الظاهرة في صفحة Storease أو قناة الدعم التي يوفرها مشغل Storease.</p>']]},
    zh:{badge:'隐私',title:'隐私政策',updated:'最后更新：2026年4月15日',footer:'Storease 法律中心',footerLink:'服务条款 →',sections:[['简介','<p>Storease 保护您放入应用中的账户信息和业务数据。本政策说明我们收集什么、如何使用以及您拥有哪些选择。</p><p>使用 Storease 即表示您同意这里描述的做法。</p>'],['我们收集的信息','<ul><li><strong>账户：</strong>姓名、邮箱、登录方式、语言和门店成员关系。</li><li><strong>业务记录：</strong>商品、供应商、客户、销售、发票、报价单、付款、支出、仓库、批次、退货以及团队录入的设置。</li><li><strong>设备与应用：</strong>应用版本、偏好设置和基础诊断日志。</li><li><strong>订阅：</strong>来自 RevenueCat 和应用商店的套餐与权益状态。</li><li><strong>本地文件：</strong>保存在设备上的 CSV 导出和 JSON 备份。</li></ul>'],['我们如何使用信息','<ul><li>提供库存、POS、财务、报表、文档和员工权限功能。</li><li>在登录同一账户和同一门店的设备之间同步数据。</li><li>根据业务活动显示仪表板、余额、提醒、收据和分析。</li><li>支持订阅、恢复购买、技术支持和安全保护。</li></ul>'],['服务提供方与共享','<ul><li><strong>Supabase</strong> 用于存储账户和业务数据。</li><li><strong>RevenueCat</strong> 用于管理订阅状态。</li><li><strong>Google Play 和 Apple App Store</strong> 用于计费和恢复购买。</li><li><strong>Google 登录</strong> 在您选择时提供安全认证。</li></ul><p>我们不会出售您的业务数据。只有在提供 Storease、处理订阅或遵守法律时才会共享必要数据。</p>'],['存储与保留','<div class="highlight"><p>Storease 的业务数据主要保存在云端，以便您在另一台登录同一账户的设备上重新打开同一门店。</p></div><ul><li>核心记录会保留，直到您删除它们、关闭账户，或法律要求移除。</li><li>系统通知历史可能会在一段时间后自动清理。</li><li>备份和导出文件会保留在您的设备上，直到您自行删除。</li></ul>'],['您的选择与联系','<ul><li>您可以在应用内查看并更新业务数据。</li><li>您可以在 Storease 和设备设置中调整通知偏好。</li><li>订阅的扣费、取消和续订由购买时使用的应用商店账户管理。</li></ul><p>随着 Storease 发展，我们可能更新本政策。若有隐私问题，请使用 Storease 页面中的支持联系方式或您的 Storease 运营方提供的支持渠道。</p>']]}};
    let currentLang='en';
    function langFromUrl(){const p=new URLSearchParams(window.location.search);const l=(p.get('lang')||'en').toLowerCase();return content[l]?l:'en'}
    function buttons(){document.querySelectorAll('[data-lang-btn]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang-btn')===currentLang))}
    function render(){const c=content[currentLang];document.documentElement.lang=currentLang;document.documentElement.setAttribute('data-lang',currentLang);document.getElementById('badge').textContent=c.badge;document.getElementById('title').textContent=c.title;document.getElementById('updated').textContent=c.updated;document.getElementById('sections').innerHTML=c.sections.map((s,i)=>`<div class="card"><h2><span class="num">${i+1}</span>${s[0]}</h2>${s[1]}</div>`).join('');document.getElementById('footer-copy').textContent=c.footer;document.getElementById('footer-link').textContent=c.footerLink;document.getElementById('footer-link').href=`../terms/?lang=${currentLang}`;document.getElementById('home-link').href=`../index.html?lang=${currentLang}`;buttons()}
    function switchLang(lang){currentLang=content[lang]?lang:'en';const u=new URL(window.location.href);u.searchParams.set('lang',currentLang);window.history.replaceState({},'',u);render()}
    currentLang=langFromUrl();render();
  </script>
