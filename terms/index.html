  <script>
    const content={en:{badge:'Terms',title:'Terms of Service',updated:'Last updated: April 15, 2026',footer:'Storease legal center',footerLink:'Privacy Policy →',sections:[['Acceptance','<p>These Terms govern your use of Storease, including the mobile app, connected services, and subscription features. By using Storease, you agree to these Terms.</p>'],['Accounts and eligibility','<p>You are responsible for the accuracy of the account information you use with Storease and for activity that happens under your account. If you invite staff, you are responsible for the access you grant them.</p><div class="highlight"><p>Use Storease only for lawful business operations and only if you have authority to manage the store data entered into the app.</p></div>'],['Plans, billing, and renewal','<ul><li>Paid access is offered through subscription plans presented in the app.</li><li>Billing, cancellation, renewal, and refunds are handled by the platform where you purchased the subscription, such as Google Play or the Apple App Store.</li><li>Storease uses RevenueCat to confirm whether your entitlement is active.</li></ul>'],['Business data and backups','<ul><li>You remain responsible for the accuracy of the business data entered into Storease.</li><li>You should create backups when needed for your own records and continuity.</li><li>Exports or backups saved only on one device remain your responsibility and may not transfer automatically to a new device.</li></ul>'],['Acceptable use','<ul><li>Do not misuse the service, attempt unauthorized access, interfere with other stores, reverse engineer protected parts of the app, or use Storease to violate law.</li><li>Do not upload or enter content you do not have the right to use.</li></ul>'],['Availability and changes','<p>We may update, improve, suspend, or retire parts of Storease from time to time. We try to keep the service available, but uninterrupted access is not guaranteed.</p>'],['Ownership and feedback','<p>Storease, its branding, software, and original materials remain the property of their respective owner. Feedback you provide may be used to improve the product without compensation.</p>'],['Suspension, liability, and contact','<p>We may suspend or end access if these Terms are violated, if payment is not maintained, or if required to protect the service or comply with law.</p><p>Storease is provided on an as-is and as-available basis. To the fullest extent allowed by law, liability for indirect or consequential loss is excluded. For legal questions, use the support contact shown in the Storease listing or the support channel provided by your Storease operator.</p>']]},
    fr:{badge:'Conditions',title:"Conditions d'utilisation",updated:'Derniere mise a jour : 15 avril 2026',footer:'Centre juridique Storease',footerLink:'Politique de confidentialite →',sections:[['Acceptation',"<p>Ces Conditions regissent votre utilisation de Storease, y compris l'application mobile, les services relies et les fonctions d'abonnement. En utilisant Storease, vous acceptez ces Conditions.</p>"],['Compte et eligibilite',"<p>Vous etes responsable de l'exactitude des informations de compte utilisees dans Storease et de l'activite effectuee sous votre compte. Si vous invitez du personnel, vous restez responsable des acces accordes.</p><div class=\"highlight\"><p>Utilisez Storease uniquement pour des operations commerciales licites et seulement si vous avez autorite sur les donnees du magasin saisies dans l'application.</p></div>"],['Abonnements et facturation',"<ul><li>L'acces payant est propose via les abonnements affiches dans l'application.</li><li>La facturation, l'annulation, le renouvellement et les remboursements sont geres par la plateforme d'achat, telle que Google Play ou l'App Store.</li><li>Storease utilise RevenueCat pour confirmer si votre entitlement est actif.</li></ul>"],['Donnees commerciales et sauvegardes',"<ul><li>Vous restez responsable de l'exactitude des donnees commerciales saisies dans Storease.</li><li>Vous devez creer des sauvegardes lorsque cela est necessaire pour vos propres dossiers et la continuite de votre activite.</li><li>Les exports ou sauvegardes enregistres uniquement sur un appareil restent sous votre responsabilite et peuvent ne pas etre transferes automatiquement vers un nouvel appareil.</li></ul>"],['Usage autorise',"<ul><li>N'utilisez pas le service de facon abusive, n'essayez pas d'obtenir un acces non autorise, d'interferer avec d'autres magasins, de retroconcevoir des parties protegees ou d'utiliser Storease en violation de la loi.</li><li>N'ajoutez pas de contenu que vous n'avez pas le droit d'utiliser.</li></ul>"],['Disponibilite et changements',"<p>Nous pouvons mettre a jour, ameliorer, suspendre ou retirer certaines parties de Storease au fil du temps. Nous essayons de maintenir le service disponible, mais l'acces ininterrompu n'est pas garanti.</p>"],['Propriete et retours',"<p>Storease, sa marque, son logiciel et ses contenus originaux restent la propriete de leur titulaire respectif. Les retours que vous fournissez peuvent etre utilises pour ameliorer le produit sans compensation.</p>"],['Suspension, responsabilite et contact',"<p>Nous pouvons suspendre ou mettre fin a l'acces en cas de violation de ces Conditions, de non-maintien du paiement ou si cela est necessaire pour proteger le service ou respecter la loi.</p><p>Storease est fourni tel quel et selon disponibilite. Dans toute la mesure permise par la loi, la responsabilite pour les pertes indirectes ou consecutives est exclue. Pour les questions juridiques, utilisez le contact d'assistance indique sur la fiche Storease ou le canal fourni par votre operateur Storease.</p>"]]},
    es:{badge:'Terminos',title:'Terminos de servicio',updated:'Ultima actualizacion: 15 de abril de 2026',footer:'Centro legal de Storease',footerLink:'Politica de privacidad →',sections:[['Aceptacion','<p>Estos Terminos regulan su uso de Storease, incluida la app movil, los servicios conectados y las funciones de suscripcion. Al usar Storease, usted acepta estos Terminos.</p>'],['Cuenta y elegibilidad','<p>Usted es responsable de la exactitud de la informacion de cuenta usada en Storease y de la actividad realizada bajo su cuenta. Si invita personal, sigue siendo responsable del acceso que conceda.</p><div class="highlight"><p>Use Storease solo para operaciones comerciales legales y solo si tiene autoridad para gestionar los datos de la tienda ingresados en la app.</p></div>'],['Planes, cobro y renovacion','<ul><li>El acceso de pago se ofrece mediante planes de suscripcion mostrados en la app.</li><li>El cobro, la cancelacion, la renovacion y los reembolsos se gestionan en la plataforma de compra, como Google Play o App Store.</li><li>Storease usa RevenueCat para confirmar si su entitlement esta activo.</li></ul>'],['Datos del negocio y copias','<ul><li>Usted sigue siendo responsable de la exactitud de los datos comerciales ingresados en Storease.</li><li>Debe crear copias cuando las necesite para sus propios registros y continuidad operativa.</li><li>Las exportaciones o copias guardadas solo en un dispositivo siguen bajo su responsabilidad y pueden no transferirse automaticamente a uno nuevo.</li></ul>'],['Uso permitido','<ul><li>No use el servicio de forma indebida, no intente acceso no autorizado, no interfiera con otras tiendas, no trate de revertir partes protegidas ni use Storease para infringir la ley.</li><li>No cargue contenido que no tenga derecho a usar.</li></ul>'],['Disponibilidad y cambios','<p>Podemos actualizar, mejorar, suspender o retirar partes de Storease de vez en cuando. Intentamos mantener el servicio disponible, pero no garantizamos acceso ininterrumpido.</p>'],['Propiedad y comentarios','<p>Storease, su marca, su software y sus materiales originales siguen siendo propiedad de su titular correspondiente. Los comentarios que usted comparta pueden usarse para mejorar el producto sin compensacion.</p>'],['Suspension, responsabilidad y contacto','<p>Podemos suspender o terminar el acceso si estos Terminos se incumplen, si no se mantiene el pago o si es necesario para proteger el servicio o cumplir la ley.</p><p>Storease se ofrece tal como esta y segun disponibilidad. En la maxima medida permitida por la ley, se excluye la responsabilidad por perdidas indirectas o consecuenciales. Para consultas legales, use el contacto de soporte mostrado en la ficha de Storease o el canal proporcionado por su operador Storease.</p>']]},
    pt:{badge:'Termos',title:'Termos de servico',updated:'Ultima atualizacao: 15 de abril de 2026',footer:'Centro legal da Storease',footerLink:'Politica de privacidade →',sections:[['Aceitacao','<p>Estes Termos regem o uso da Storease, incluindo o app movel, os servicos conectados e os recursos de assinatura. Ao usar a Storease, voce concorda com estes Termos.</p>'],['Conta e elegibilidade','<p>Voce e responsavel pela exatidao das informacoes da conta usadas na Storease e pela atividade feita sob sua conta. Se convidar equipe, continua responsavel pelos acessos concedidos.</p><div class="highlight"><p>Use a Storease apenas para operacoes comerciais licitas e somente se voce tiver autoridade para administrar os dados da loja inseridos no app.</p></div>'],['Planos, cobranca e renovacao','<ul><li>O acesso pago e oferecido por planos de assinatura exibidos no app.</li><li>Cobranca, cancelamento, renovacao e reembolso sao tratados pela plataforma de compra, como Google Play ou App Store.</li><li>A Storease usa RevenueCat para confirmar se o entitlement esta ativo.</li></ul>'],['Dados do negocio e backups','<ul><li>Voce continua responsavel pela exatidao dos dados comerciais inseridos na Storease.</li><li>Voce deve criar backups quando necessario para seus registros e continuidade operacional.</li><li>Exportacoes ou backups salvos somente em um dispositivo permanecem sob sua responsabilidade e podem nao ser transferidos automaticamente para um novo aparelho.</li></ul>'],['Uso permitido','<ul><li>Nao use o servico de forma indevida, nao tente acesso nao autorizado, nao interfira com outras lojas, nao reverta partes protegidas e nao use a Storease para violar a lei.</li><li>Nao envie conteudo que voce nao tenha direito de usar.</li></ul>'],['Disponibilidade e mudancas','<p>Podemos atualizar, melhorar, suspender ou encerrar partes da Storease de tempos em tempos. Tentamos manter o servico disponivel, mas acesso ininterrupto nao e garantido.</p>'],['Propriedade e feedback','<p>Storease, sua marca, seu software e seus materiais originais continuam sendo propriedade do respectivo titular. O feedback que voce enviar pode ser usado para melhorar o produto sem compensacao.</p>'],['Suspensao, responsabilidade e contato','<p>Podemos suspender ou encerrar o acesso se estes Termos forem violados, se o pagamento nao for mantido ou se isso for necessario para proteger o servico ou cumprir a lei.</p><p>A Storease e fornecida no estado em que se encontra e conforme disponibilidade. Na maxima medida permitida por lei, a responsabilidade por perdas indiretas ou consequenciais e excluida. Para duvidas legais, use o contato de suporte exibido na listagem da Storease ou o canal fornecido pelo operador da Storease.</p>']]},
    ar:{badge:'الشروط',title:'شروط الخدمة',updated:'آخر تحديث: 15 أبريل 2026',footer:'مركز Storease القانوني',footerLink:'سياسة الخصوصية ←',sections:[['القبول','<p>تنظم هذه الشروط استخدامك لتطبيق Storease بما في ذلك التطبيق والخدمات المرتبطة وميزات الاشتراك. باستخدام Storease فإنك توافق على هذه الشروط.</p>'],['الحساب والأهلية','<p>أنت مسؤول عن دقة معلومات الحساب المستخدمة في Storease وعن أي نشاط يتم من خلال حسابك. وإذا قمت بدعوة موظفين فأنت مسؤول عن الصلاحيات التي تمنحها لهم.</p><div class="highlight"><p>استخدم Storease فقط لأغراض تجارية مشروعة وفقط إذا كانت لديك صلاحية إدارة بيانات المتجر المدخلة داخل التطبيق.</p></div>'],['الخطط والفوترة والتجديد','<ul><li>يتم تقديم الوصول المدفوع من خلال خطط الاشتراك المعروضة داخل التطبيق.</li><li>تتم إدارة الفوترة والإلغاء والتجديد والاسترداد من خلال منصة الشراء مثل Google Play أو App Store.</li><li>تستخدم Storease خدمة RevenueCat لتأكيد حالة الامتياز النشط.</li></ul>'],['بيانات المتجر والنسخ الاحتياطية','<ul><li>تبقى مسؤولاً عن دقة البيانات التجارية التي يتم إدخالها في Storease.</li><li>يجب عليك إنشاء نسخ احتياطية عند الحاجة لسجلاتك الخاصة واستمرارية العمل.</li><li>تظل ملفات التصدير أو النسخ المحفوظة على جهاز واحد فقط تحت مسؤوليتك وقد لا تنتقل تلقائيًا إلى جهاز جديد.</li></ul>'],['الاستخدام المسموح','<ul><li>لا يجوز إساءة استخدام الخدمة أو محاولة الوصول غير المصرح به أو التدخل في متاجر أخرى أو محاولة عكس أجزاء محمية أو استخدام Storease بما يخالف القانون.</li><li>لا تقم برفع أو إدخال محتوى لا تملك الحق في استخدامه.</li></ul>'],['التوفر والتغييرات','<p>يجوز لنا تحديث أجزاء من Storease أو تحسينها أو تعليقها أو إيقافها من وقت لآخر. نحاول إبقاء الخدمة متاحة، لكننا لا نضمن توفرًا دون انقطاع.</p>'],['الملكية والملاحظات','<p>تبقى Storease وعلامتها وبرمجيتها وموادها الأصلية ملكًا لمالكها المعني. ويمكن استخدام الملاحظات التي تقدمها لتحسين المنتج دون تعويض.</p>'],['الإيقاف والمسؤولية والتواصل','<p>يجوز لنا تعليق الوصول أو إنهاؤه إذا تم خرق هذه الشروط أو لم تتم المحافظة على الدفع أو إذا كان ذلك ضروريًا لحماية الخدمة أو للامتثال للقانون.</p><p>يتم تقديم Storease كما هي وحسب التوفر. وإلى أقصى حد يسمح به القانون يتم استبعاد المسؤولية عن الخسائر غير المباشرة أو التبعية. للاستفسارات القانونية استخدم جهة الدعم الظاهرة في صفحة Storease أو قناة الدعم التي يوفرها مشغل Storease.</p>']]},
    zh:{badge:'条款',title:'服务条款',updated:'最后更新：2026年4月15日',footer:'Storease 法律中心',footerLink:'隐私政策 →',sections:[['接受条款','<p>本条款适用于您对 Storease 的使用，包括移动应用、相关服务以及订阅功能。使用 Storease 即表示您同意这些条款。</p>'],['账户与资格','<p>您需要对在 Storease 中使用的账户信息准确性以及账户下发生的活动负责。如果您邀请员工，您也需要对授予的访问权限负责。</p><div class="highlight"><p>只有在您有权管理录入应用中的门店数据时，才可将 Storease 用于合法商业运营。</p></div>'],['套餐、计费与续订','<ul><li>付费访问通过应用中显示的订阅计划提供。</li><li>计费、取消、续订和退款由购买平台处理，例如 Google Play 或 App Store。</li><li>Storease 使用 RevenueCat 来确认您的权益状态是否有效。</li></ul>'],['业务数据与备份','<ul><li>您仍需对录入 Storease 的业务数据准确性负责。</li><li>如有需要，您应自行创建备份以满足记录和持续经营需要。</li><li>仅保存在单台设备上的导出或备份文件仍由您负责，可能不会自动转移到新设备。</li></ul>'],['允许的使用方式','<ul><li>不得滥用服务、尝试未授权访问、干扰其他门店、逆向受保护部分，或使用 Storease 从事违法行为。</li><li>不得上传或录入您无权使用的内容。</li></ul>'],['可用性与变更','<p>我们可能会不时更新、改进、暂停或停止 Storease 的部分功能。我们会尽力保持服务可用，但不保证持续不中断。</p>'],['所有权与反馈','<p>Storease、其品牌、软件和原创资料的权利归相应权利人所有。您提供的反馈可被用于改进产品，且无需向您支付补偿。</p>'],['暂停、责任与联系','<p>如果违反这些条款、未维持付费状态，或为了保护服务或遵守法律，我们可以暂停或终止访问权限。</p><p>Storease 按“现状”和“可用”基础提供。在法律允许的最大范围内，我们不对间接或后果性损失承担责任。如有法律问题，请使用 Storease 页面中的支持联系方式，或您的 Storease 运营方提供的支持渠道。</p>']]}};
    let currentLang='en';
    function langFromUrl(){const p=new URLSearchParams(window.location.search);const l=(p.get('lang')||'en').toLowerCase();return content[l]?l:'en'}
    function buttons(){document.querySelectorAll('[data-lang-btn]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-lang-btn')===currentLang))}
    function render(){const c=content[currentLang];document.documentElement.lang=currentLang;document.documentElement.setAttribute('data-lang',currentLang);document.getElementById('badge').textContent=c.badge;document.getElementById('title').textContent=c.title;document.getElementById('updated').textContent=c.updated;document.getElementById('sections').innerHTML=c.sections.map((s,i)=>`<div class="card"><h2><span class="num">${i+1}</span>${s[0]}</h2>${s[1]}</div>`).join('');document.getElementById('footer-copy').textContent=c.footer;document.getElementById('footer-link').textContent=c.footerLink;document.getElementById('footer-link').href=`../privacy/?lang=${currentLang}`;document.getElementById('home-link').href=`../index.html?lang=${currentLang}`;buttons()}
    function switchLang(lang){currentLang=content[lang]?lang:'en';const u=new URL(window.location.href);u.searchParams.set('lang',currentLang);window.history.replaceState({},'',u);render()}
    currentLang=langFromUrl();render();
  </script>
